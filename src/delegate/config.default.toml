[defaults]
task_type = "code-gen"
concurrency = 1
worktree_root = "/Volumes/onn/.delegate-worktrees"
log_path = "~/.claude/skills/delegate/state/delegate.jsonl"
openrouter_has_credits = false  # set true after buying $10+ credits → unlocks 1000/day

[timeouts]
code-gen = 600
research = 300
bulk = 180

[circuit_breaker]
window = 10
failure_threshold = 0.5
halt_on_trip = true

[providers.kimi-code]
cli = "kimi"
rpm_cap = 150  # TODO verify moonshot subscription tier; Tier 1 observed = 200 rpm
default_model = "k2p5"
billing = "subscription"
supports_edits = true

[providers.opencode-go]
cli = "opencode"
allowlist = ["glm-5", "kimi-k2.5", "minimax-m2.5"]
default_model = "minimax-m2.5"
rpm_cap = 60  # TODO verify — opencode go uses $-based limits, not rpm; conservative placeholder
billing = "subscription"
supports_edits = true

  # zen-trap patterns: case-insensitive regex, substring match on stderr/stdout combined.
  # literal substrings work as-is; use .? for optional chars (e.g. "pay.?as.?you.?go").
zen_fail_patterns = [
  "insufficient balance",
  "no resource package",
  "quota exceeded",
  "1008",
  "402",
  "opencode zen",
  "pay.?as.?you.?go",
  "billing_hard_limit",
  "insufficient_quota",
]

[providers.gemini-pro]
cli = "gemini"
model_flag = "-m"
allowlist = ["gemini-2.5-pro"]
default_model = "gemini-2.5-pro"
rpm_cap = 100
billing = "subscription"
supports_edits = true

[providers.gemini-flash]
cli = "gemini"
model_flag = "-m"
allowlist = ["gemini-2.5-flash"]
default_model = "gemini-2.5-flash"
rpm_cap = 250  # TODO verify Tier 1 Flash rpm from Google AI Pro docs
billing = "subscription"
supports_edits = true

[providers.openrouter-free]
api = "https://openrouter.ai/api/v1/chat/completions"
key_endpoint = "https://openrouter.ai/api/v1/key"
api_key_env = "OPENROUTER_API_KEY"
allowlist_suffix = ":free"
default_model = "deepseek/deepseek-chat-v3.1:free"
rpm_cap = 15
billing = "free"
supports_edits = false

# code-gen: kimi first (subscription coding specialty), opencode-go + gemini-pro, free fallback last
[[chains.code-gen]]
provider = "kimi-code"
model = "k2p5"
[[chains.code-gen]]
provider = "opencode-go"
model = "minimax-m2.5"
[[chains.code-gen]]
provider = "gemini-pro"
model = "gemini-2.5-pro"
[[chains.code-gen]]
provider = "openrouter-free"
model = "deepseek/deepseek-chat-v3.1:free"

# bulk: free first (that's what free tier is for), then flash, then opencode-go
[[chains.bulk]]
provider = "openrouter-free"
model = "deepseek/deepseek-chat-v3.1:free"
[[chains.bulk]]
provider = "gemini-flash"
model = "gemini-2.5-flash"
[[chains.bulk]]
provider = "opencode-go"
model = "minimax-m2.5"

# research: gemini-pro first (long context wins), opencode-go, free fallback
[[chains.research]]
provider = "gemini-pro"
model = "gemini-2.5-pro"
[[chains.research]]
provider = "opencode-go"
model = "minimax-m2.5"
[[chains.research]]
provider = "openrouter-free"
model = "deepseek/deepseek-chat-v3.1:free"
